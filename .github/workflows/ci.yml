name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  DATABASE_URL: postgresql://finops:finops@127.0.0.1:55432/finops_test
  JWT_SECRET: ci-finops-jwt-secret-with-at-least-thirty-two-chars
  AI_API_KEY: ci-placeholder-key
  AI_BASE_URL: http://127.0.0.1:9999/v1
  INGESTION_WORKER_ENABLED: 'false'
  AGENT_LEARNING_WORKER_ENABLED: 'false'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run test:ai:offline
      - run: npm run build
      - run: npm audit --omit=dev --audit-level=high

  integration:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:integration:docker
      - run: npm run build
      - name: Create API smoke fixtures
        run: >
          TEST_DATABASE_URL=postgresql://finops:finops@localhost:55432/finops_test
          ALLOW_DESTRUCTIVE_TEST_DATABASE=true
          npm run test:fixtures:create
      - name: Start API and run smoke contract
        env:
          DATABASE_URL: postgresql://finops:finops@localhost:55432/finops_test
          JWT_SECRET: ci-finops-jwt-secret-with-at-least-thirty-two-chars
          AI_API_KEY: ci-placeholder-key
          AI_BASE_URL: http://127.0.0.1:9999/v1
          INGESTION_WORKER_ENABLED: 'false'
          AGENT_LEARNING_WORKER_ENABLED: 'false'
        run: |
          node dist/index.js > backend-smoke.log 2>&1 &
          for i in {1..30}; do curl -fsS http://127.0.0.1:3000/health && break || sleep 1; done
          npm run test:api:smoke
      - name: Print API log on failure
        if: failure()
        run: cat backend-smoke.log

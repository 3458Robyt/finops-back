name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  DATABASE_URL: postgresql://finops:finops@127.0.0.1:55432/finops_test
  JWT_SECRET: ci-finops-jwt-secret-with-at-least-thirty-two-chars
  AI_API_KEY: ci-placeholder-key
  AI_BASE_URL: http://127.0.0.1:9999/v1
  INGESTION_WORKER_ENABLED: 'false'
  INGESTION_SCHEDULER_ENABLED: 'false'
  AGENT_LEARNING_WORKER_ENABLED: 'false'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run test:ai:offline
      - run: npm run build
      - run: npm audit --omit=dev --audit-level=high

  integration:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run test:integration:docker
      - run: npm run build
      - name: Create API smoke fixtures
        run: >
          TEST_DATABASE_URL=postgresql://finops:finops@localhost:55432/finops_test
          ALLOW_DESTRUCTIVE_TEST_DATABASE=true
          npm run test:fixtures:create
      - name: Start API and run smoke contract
        env:
          DATABASE_URL: postgresql://finops:finops@localhost:55432/finops_test
          JWT_SECRET: ci-finops-jwt-secret-with-at-least-thirty-two-chars
          AI_API_KEY: ci-placeholder-key
          AI_BASE_URL: http://127.0.0.1:9999/v1
          INGESTION_WORKER_ENABLED: 'false'
          INGESTION_SCHEDULER_ENABLED: 'false'
          AGENT_LEARNING_WORKER_ENABLED: 'false'
        run: |
          node dist/index.js > backend-smoke.log 2>&1 &
          ready=false
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000/health; then ready=true; break; fi
            sleep 1
          done
          test "$ready" = true
          npm run test:api:smoke
      - name: Run frontend resource intelligence E2E against fixture API
        uses: actions/checkout@v4
        with:
          repository: 3458Robyt/finops---front
          path: finops-app
      - name: Install frontend E2E dependencies
        working-directory: finops-app
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Verify frontend resource intelligence flow
        working-directory: finops-app
        env:
          CI: 'true'
          VITE_API_BASE_URL: http://127.0.0.1:3000/api/v1
          E2E_FIXTURE_FILE: ../.test-artifacts/e2e-fixtures.json
        run: npx playwright test e2e/finops-app.spec.ts
      - name: Print API log on failure
        if: failure()
        run: test -f backend-smoke.log && cat backend-smoke.log || true

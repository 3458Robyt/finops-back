services:
  postgres:
    image: postgres:16-alpine
    container_name: finops-postgres
    environment:
      POSTGRES_USER: finops
      POSTGRES_PASSWORD: finops
      POSTGRES_DB: finops
    ports:
      - "5432:5432"
    volumes:
      - finops-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finops -d finops"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  finops-postgres-data:
